<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="flex-grow flex items-center justify-center p-4 sm:p-8">
<div class="w-full max-w-md">
<!-- Asymmetric Header / Branding -->
<div class="relative mb-12 flex justify-start">
<!-- Organic Background Blob -->
<div class="absolute -top-10 -left-6 w-32 h-32 bg-primary-container rounded-full blur-2xl opacity-70 mix-blend-multiply pointer-events-none"></div>
<div class="absolute top-4 left-10 w-24 h-24 bg-secondary-container rounded-full blur-xl opacity-60 mix-blend-multiply pointer-events-none"></div>
<h1 class="relative z-10 font-headline font-extrabold text-5xl tracking-tighter text-on-background">
                    দখতা
                </h1>
<!-- Collage Element -->
<div class="absolute right-0 top-0 translate-x-4 -translate-y-6 rotate-6 w-24 h-24 bg-surface-container-highest rounded-full overflow-hidden shadow-[0_10px_20px_rgba(0,0,0,0.1)] border-4 border-surface" data-alt="cutout collage element of a vintage computer monitor against a vibrant lime green background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCuWRUl6qhksAOQ8eTBt9Zyzi0Zk_jEi9wlOjWZbRlmQTJoHcZUQ8tXh5-Cnr6CMMtcDItmPi5y3ILTNODJ05EHMRhBNpBZZL3BVaUKLGlGBaBEMFAEa9jPqABu9aOGZnkh3fc2CgC910TF3YWk6vxuUbAuJMpD-aCOR59FBLFYACj-mro9Vx_Lbe1UCtHomLwMwn7tw6dEdgZR0B_jJSlHenQP4K9M7NFvuvakd6YI5akruHno_059m0hPf9toRl0Pk6mLLO84'); background-size: cover; background-position: center;">
</div>
</div>
<!-- Login Card -->
<div class="bg-surface-container-low rounded-xl p-8 sm:p-10 shadow-[0_8px_30px_rgba(0,0,0,0.04)] relative overflow-hidden">
<!-- Inner decorative organic shape -->
<div class="absolute -bottom-20 -right-20 w-64 h-64 bg-secondary-container rounded-full blur-3xl opacity-40"></div>
<div class="relative z-10">
<h2 class="font-headline font-bold text-3xl mb-8 text-on-surface">লগইন করুন</h2>
<form class="space-y-8">
<!-- Mobile Number Input -->
<div class="space-y-3">
<label class="block font-label font-bold text-sm text-on-surface-variant uppercase tracking-wider" for="mobile">মোবাইল নম্বর</label>
<div class="relative flex items-center bg-surface-container-highest rounded-lg overflow-hidden group transition-all duration-300 focus-within:ring-2 focus-within:ring-primary focus-within:shadow-[0_4px_15px_rgba(198,254,0,0.2)]">
<span class="pl-5 pr-3 py-4 font-headline font-bold text-on-surface border-r border-outline-variant/20 bg-surface-container/50">
                                    +880
                                </span>
<input class="w-full bg-transparent border-none py-4 px-4 font-body text-lg text-on-surface placeholder:text-outline focus:ring-0" id="mobile" name="mobile" pattern="[0-9]{10}" placeholder="1XXXXXXXXX" type="tel"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full relative group overflow-hidden bg-primary text-on-primary font-headline font-bold text-lg py-5 px-8 rounded-xl transition-all duration-300 hover:shadow-[0_10px_25px_rgba(198,254,0,0.4)] active:scale-[0.98] mt-4" type="submit">
<!-- Gradient overlay for tactile feel -->
<div class="absolute inset-0 bg-gradient-to-r from-primary to-primary-container opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<span class="relative z-10 flex items-center justify-center gap-2">
                                ওটিপি পাঠান
                                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</span>
</button>
</form>
</div>
</div>
